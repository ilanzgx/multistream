<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiStream - Watch Multiple Streams</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #1f2227;
        overflow: hidden;
      }

      /* splash screen */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1f2227;
        transition:
          opacity 0.4s ease,
          visibility 0.4s ease;
      }

      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      #splash img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        animation: pulse 1.8s ease-in-out infinite;
      }

      #splash p {
        margin-top: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #6b7280;
        letter-spacing: 0.5px;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
          transform: scale(0.96);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* loading dots */
      #splash .dots span {
        display: inline-block;
        width: 5px;
        height: 5px;
        margin: 0 3px;
        border-radius: 50%;
        background: #4b5563;
        animation: dot-bounce 1.2s ease-in-out infinite;
      }
      #splash .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      #splash .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes dot-bounce {
        0%,
        80%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        40% {
          opacity: 1;
          transform: scale(1.2);
        }
      }
    </style>
  </head>
  <body>
    <!-- splash screen: visible immediately, removed when Vue mounts -->
    <div id="splash">
      <img src="/splash-icon.png" alt="Multistream" />
      <div class="dots" style="margin-top: 24px">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
