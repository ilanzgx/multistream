[[permission]]
identifier = "custom-commands"
description = "Enables all custom app commands"
commands.allow = [
    "send_notification",
    "save_screenshot",
    "is_transcription_supported",
    "download_whisper_model",
    "cancel_whisper_download",
    "delete_whisper_model",
    "get_transcription_status",
    "start_transcription",
    "stop_transcription",
    "set_chunk_duration",
    "twitch_login",
    "twitch_cancel_login",
    "twitch_logout",
    "twitch_get_auth_state",
    "twitch_set_channels",
    "twitch_get_messages",
    "twitch_get_connection_state",
    "twitch_send_message",
    "kick_login",
    "kick_cancel_login",
    "kick_handle_callback",
    "kick_logout",
    "kick_get_auth_state",
    "kick_send_message",
    "kick_set_channels",
    "twitch_get_followed_streams",
    "start_recording",
    "stop_recording",
    "is_recording",
    "list_recordings",
    "open_recording_folder",
    "recover_orphan_recording",
    "dismiss_orphan_recording",
    "is_recording_supported_cmd",
    "recording_check_dependencies",
    "recording_install_dependencies",
    "scan_orphans"
]
